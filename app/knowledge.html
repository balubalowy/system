<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baza Wiedzy - B-Core</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1C1C1E">
    <link rel="apple-touch-icon" href="icons/icon-512.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=20.1">
    <style>
        .tree-scroll::-webkit-scrollbar { width: 4px; }
        .tree-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    </style>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-messaging-compat.js"></script>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-505S145DR8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-505S145DR8');
    </script>
</head>
<body>
    <header class="topbar">
        <div class="logo">
            <button class="btn btn-ghost" id="mobile-menu-btn" style="padding: 4px; display: none;"><i data-lucide="menu"></i></button>
            <i data-lucide="command" class="symbol"></i>
            <h1>B <span>-Core</span></h1>
            <div style="display:flex; flex-direction:column; margin-left: 12px; gap: 2px;">
                <span id="btn-force-srs-sync" style="font-size:10px; color:var(--text-secondary); cursor:pointer; padding:2px 4px; border-radius:4px; line-height: 1;" title="Synchronizuj ręcznie"><i data-lucide="refresh-cw" style="width:10px; height:10px; vertical-align:middle; margin-right:4px;"></i><span id="cloud-status" style="color:var(--accent-success);">Synced</span></span>
                <span id="mini-sync-status" style="font-size: 8px; color:var(--text-secondary); padding-left:4px; font-family:var(--font-mono);">Oczekiwanie...</span>
            </div>
            <button class="btn btn-ghost" id="theme-toggle-btn" style="margin-left: 10px; padding:4px 8px;" title="Przełącz Motyw"><i data-lucide="sun-moon"></i></button>
            <button class="btn btn-ghost" id="btn-zero-energy" style="margin-left: 6px; padding:4px 8px;" title="Włącz tryb Low Energy (Tryb Baterii)"><i data-lucide="battery-low"></i></button>
        </div>
        
        <div style="flex-grow:1; max-width:400px; margin:0 20px;">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom: 6px;">
                <label style="width:50px; color:var(--text-secondary); font-size:0.85rem; font-weight:500;">Energia</label>
                <div class="energy-track" id="energy-track" title="Kliknij, by ustawić energię">
                    <div class="energy-fill" id="energy-fill" style="width: 50%;"></div>
                </div>
                <span class="energy-val" id="energy-val-display" style="width:40px; font-family:var(--font-mono); font-weight:500; font-size:0.85rem;">5/10</span>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <label style="width:50px; color:var(--accent-info); font-size:0.85rem; font-weight:500;">Dzień</label>
                <div class="energy-track" style="background:rgba(255,255,255,0.05); pointer-events:none;">
                    <div class="energy-fill" id="time-fill" style="width: 0%; background:var(--accent-info); transition: width 1s linear;"></div>
                </div>
                <span id="time-val-display" style="width:40px; font-family:var(--font-mono); font-weight:500; font-size:0.85rem; color:#fff;">--:--</span>
            </div>
        </div>

        <div class="top-stats">
            <a href="index.html" class="btn btn-ghost" title="Powrót do Pulpitu"><i data-lucide="layout-dashboard"></i> Pulpit</a>
            <a href="inbox.html" class="btn btn-ghost" title="Skok do Zrzutni Zadań"><i data-lucide="inbox"></i> Zrzutnia</a>
            <a href="knowledge.html" class="btn btn-ghost" title="Baza Wiedzy"><i data-lucide="network"></i> Wiedza</a>
            <a href="budget.html" class="btn btn-ghost" title="Budżet i Inwestycje"><i data-lucide="landmark"></i> Budżet</a>
        </div>
    </header>

    <div class="container">
        <main class="main-content">
        <div class="section-header" style="flex-direction: column; align-items: flex-start; gap: var(--space-1); border-bottom: 1px solid var(--border-subtle); padding-bottom: 15px; margin-bottom: 24px;">
            <h2 style="font-size: 1.5rem; display:flex; align-items:center; gap:12px; font-weight:600;"><i data-lucide="network" style="color:var(--accent-primary); width:24px; height:24px;"></i> Baza Wiedzy</h2>
            <span class="date-subtitle" style="font-family: var(--font-sans); color: var(--text-secondary); margin-bottom: 0;">Kierunki Rozwoju</span>
        </div>
        <div class="knowledge-layout">
            <!-- LEWE MENU -->
            <aside class="knowledge-sidebar" id="k-sidebar">
                <div style="color: var(--text-secondary); font-size: 0.9rem;">
                    <i data-lucide="loader-2" style="animation: spin 2s linear infinite;"></i> Trwa wczytywanie...
                </div>
            </aside>
            <!-- PRAWE OKNO -->
            <section class="knowledge-main" id="k-main">
                <div class="k-empty-state">
                    <i data-lucide="arrow-left" style="width: 48px; height: 48px; color: var(--border-strong); margin-bottom: 20px;"></i>
                    <p>Wybierz dziedzinę z menu po lewej, aby rozwinąć drzewo.</p>
                </div>
            </section>
        </div>
        </main>
    </div>
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/data.js"></script>
    <script src="js/local_data.js"></script>
    <script src="js/sidebar.js"></script>
    <script type="module" src="js/global.js"></script>
    <script type="module" src="js/knowledge.js"></script>
        </body>
</html>
