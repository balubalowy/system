<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drzewo Wiedzy - B-Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=19.0">
    <style>
        body { padding-top: 80px; }
        .tree-scroll::-webkit-scrollbar { width: 4px; }
        .tree-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
    </style>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-505S145DR8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-505S145DR8');
    </script>
</head>
<body class="no-sidebar">
    <header class="topbar">
        <div class="logo">
            <i data-lucide="command" class="symbol"></i>
            <h1>B <span>-Core</span></h1>
            <div style="display:flex; flex-direction:column; margin-left: 12px; gap: 2px;">
                <span id="btn-force-srs-sync" style="font-size:10px; color:var(--text-secondary); cursor:pointer; padding:2px 4px; border-radius:4px; line-height: 1;" title="Synchronizuj ręcznie"><i data-lucide="refresh-cw" style="width:10px; height:10px; vertical-align:middle; margin-right:4px;"></i><span id="cloud-status" style="color:var(--accent-success);">Synced</span></span>
                <span id="mini-sync-status" style="font-size: 8px; color:var(--text-secondary); padding-left:4px; font-family:var(--font-mono);">Oczekiwanie...</span>
            </div>
            <button class="btn btn-ghost" id="theme-toggle-btn" style="margin-left: 10px; padding:4px 8px;" title="Przełącz Motyw"><i data-lucide="sun-moon"></i></button>
        </div>
        
        <div style="flex-grow:1; max-width:400px; margin:0 20px;">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom: 6px;">
                <label style="width:50px; color:var(--text-secondary); font-size:0.85rem; font-weight:500;">Energia</label>
                <div class="energy-track" id="energy-track" title="Kliknij, by ustawić energię">
                    <div class="energy-fill" id="energy-fill" style="width: 50%;"></div>
                </div>
                <span class="energy-val" id="energy-val-display" style="width:40px; font-family:var(--font-mono); font-weight:500; font-size:0.85rem;">5/10</span>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <label style="width:50px; color:var(--accent-info); font-size:0.85rem; font-weight:500;">Dzień</label>
                <div class="energy-track" style="background:rgba(255,255,255,0.05); pointer-events:none;">
                    <div class="energy-fill" id="time-fill" style="width: 0%; background:var(--accent-info); transition: width 1s linear;"></div>
                </div>
                <span id="time-val-display" style="width:40px; font-family:var(--font-mono); font-weight:500; font-size:0.85rem; color:#fff;">--:--</span>
            </div>
        </div>

        <div class="top-stats">
            <a href="index.html" class="btn btn-ghost" title="Powrót do Pulpitu"><i data-lucide="layout-dashboard"></i> Pulpit</a>
            <a href="inbox.html" class="btn btn-ghost" title="Skok do Zrzutni Zadań"><i data-lucide="inbox"></i> Zrzutnia</a>
            <button class="btn btn-ghost" id="btn-zero-energy" title="Włącz tryb Low Energy (Focus)"><i data-lucide="battery-low"></i> Tryb Baterii</button>
        </div>
    </header>

    <main style="max-width: 1600px; margin: 0 auto; padding: var(--space-6);">
        <div class="section-header" style="flex-direction: column; align-items: flex-start; gap: var(--space-1); border-bottom: 1px solid var(--border-subtle); padding-bottom: 15px; margin-bottom: 24px;">
            <h2 style="font-size: 1.5rem; display:flex; align-items:center; gap:12px; font-weight:600;"><i data-lucide="network" style="color:var(--accent-primary); width:24px; height:24px;"></i> Baza Akademicka</h2>
            <span class="date-subtitle" style="font-family: var(--font-sans); color: var(--text-secondary); margin-bottom: 0;">Syllabus Systemowy</span>
        </div>
        <div class="knowledge-layout">
            <!-- LEWE MENU -->
            <aside class="knowledge-sidebar" id="k-sidebar">
                <div style="color: var(--text-secondary); font-size: 0.9rem;">
                    <i data-lucide="loader-2" style="animation: spin 2s linear infinite;"></i> Trwa wczytywanie...
                </div>
            </aside>
            <!-- PRAWE OKNO -->
            <section class="knowledge-main" id="k-main">
                <div class="k-empty-state">
                    <i data-lucide="arrow-left" style="width: 48px; height: 48px; color: var(--border-strong); margin-bottom: 20px;"></i>
                    <p>Wybierz dziedzinę z menu po lewej, aby rozwinąć drzewo.</p>
                </div>
            </section>
        </div>
    </main>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/firebase_init.js"></script>
    <script src="js/data.js"></script>
    <script src="js/knowledge_tree.js"></script>
    <script src="js/knowledge_tree_2.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', currentTheme);
            const themeBtn = document.getElementById('theme-toggle-btn');
            if(themeBtn) {
                themeBtn.addEventListener('click', () => {
                    let theme = document.documentElement.getAttribute('data-theme');
                    let next = theme === 'dark' ? 'light' : 'dark';
                    document.documentElement.setAttribute('data-theme', next);
                    localStorage.setItem('theme', next);
                });
            }
            if(window.lucide) window.lucide.createIcons();

            let localProgress = {};
            let globalTree = {};
            
            db.ref(USER_NODE + 'knowledge').once('value').then(snap => {
                localProgress = snap.val() || {};
                renderSidebar();
            }).catch(e => {
                renderSidebar();
            });

            // Category color map
            function getCatColor(cat) {
                let t = cat.toLowerCase();
                if(t.includes('matematyk') || t.includes('statystyk') || t.includes('algebra') || t.includes('excel') || t.includes('power')) return '#2BBF71';
                if(t.includes('ekonomia') || t.includes('finans') || t.includes('wycena') || t.includes('rachunkowo')) return '#0A84FF';
                if(t.includes('python') || t.includes('programowanie') || t.includes('bazy danych') || t.includes('sql')) return '#5E5CE6';
                if(t.includes('rozwój') || t.includes('zarządzanie') || t.includes('biznes') || t.includes('mba') || t.includes('pmp')) return '#FF9F0A';
                if(t.includes('adhd') || t.includes('kognitywistyka') || t.includes('dopamin')) return '#FF375F';
                if(t.includes('angielski') || t.includes('język')) return '#64D2FF';
                if(t.includes('prezentacja') || t.includes('wizualizacja')) return '#FF453A';
                return '#8B949E';
            }

            function renderSidebar() {
                const sidebar = document.getElementById('k-sidebar');
                globalTree = window.KnowledgeTree || {};
                let keys = Object.keys(globalTree);
                
                // --- MIGRACJA HISTORII (Legacy Sync) ---
                if (window.appData && window.appData.knowledgeAreas) {
                    Object.values(window.appData.knowledgeAreas).forEach(area => {
                        area.items.forEach(item => {
                            if (globalTree[item.title] && !localProgress[item.title] && item.level > 0) {
                                db.ref(USER_NODE + 'knowledge/' + item.title).set({
                                    level: item.level,
                                    updatedAt: Date.now()
                                });
                                localProgress[item.title] = { level: item.level };
                            }
                        });
                    });
                }
                // --- END MIGRACJA ---
                
                if(keys.length === 0) {
                    sidebar.innerHTML = '<div style="color:var(--text-secondary); text-align:center;">Oczekuje na zapis bazy przez Agenta w tle... (Odśwież)</div>';
                    return;
                }

                sidebar.innerHTML = '';
                
                keys.forEach((cat, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'category-btn';
                    let color = getCatColor(cat);

                    let level = 0;
                    if(localProgress[cat] && localProgress[cat].level !== undefined) {
                        level = localProgress[cat].level;
                    }

                    const circleSize = 6 + (level / 100) * 12;
                    const opacity = level === 0 ? 0.3 : 1;

                    btn.innerHTML = `
                        <span>${cat} <span style="font-family: var(--font-mono); font-size:0.75rem; color:var(--text-secondary); margin-left:8px;">(${level}%)</span></span>
                        <div style="width: ${circleSize}px; height: ${circleSize}px; background-color: ${color}; border-radius: 50%; opacity: ${opacity}; transition: all 0.3s; margin-left:auto;"></div>
                    `;
                    btn.onclick = () => {
                        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        renderMainArea(cat, color, level);
                    };
                    sidebar.appendChild(btn);

                    if(idx === 0) {
                        btn.click();
                    }
                });
            }

            function renderMainArea(category, color, currentLevel) {
                const main = document.getElementById('k-main');
                const items = globalTree[category] || [];
                
                const totalItems = items.length;
                const maxCompletedIndex = Math.floor((currentLevel / 100) * totalItems) - 1;

                let html = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-subtle);">
                        <h2 style="font-size: 1.5rem; color: var(--text-primary); font-weight: 600; display:flex; align-items:center; gap: 12px;">
                            <div style="width: 12px; height: 24px; background-color: ${color}; border-radius: 4px;"></div>
                            ${category}
                        </h2>
                        <span style="font-size: 1rem; font-family: var(--font-mono); color: ${color}; background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 4px;">Postęp: ${currentLevel}%</span>
                    </div>
                    <div class="tree-scroll" style="display:flex; flex-direction:column; gap: 4px;">
                `;

                items.forEach((item, idx) => {
                    const isDone = idx <= maxCompletedIndex;
                    const icon = isDone ? 'check-circle-2' : 'circle';
                    const itemColor = isDone ? color : 'var(--text-secondary)';
                    const opacity = isDone ? '1' : '0.4';
                    
                    html += `
                        <div class="knowledge-item interactive" onclick="window.updateKnowledgeProgress('${category}', ${idx}, ${totalItems})" style="opacity: ${opacity}; font-size: 0.95rem; padding: 12px 12px; display:flex; align-items:center; gap:16px; background: ${isDone ? 'rgba(255,255,255,0.03)' : 'transparent'}; border-radius: 6px; cursor: pointer; transition: all 0.2s; border: 1px solid ${isDone ? 'rgba(255,255,255,0.05)' : 'transparent'};">
                            <i data-lucide="${icon}" style="width: 18px; height: 18px; min-width:18px; color: ${itemColor};"></i>
                            <span style="color: ${isDone ? 'var(--text-primary)' : 'var(--text-secondary)'};"><strong>${idx+1}.</strong> ${item}</span>
                        </div>
                    `;
                });

                html += `</div>`;
                main.innerHTML = html;
                if(window.lucide) window.lucide.createIcons();
            }

            // Globalna funkcja dla onclick
            window.updateKnowledgeProgress = function(category, clickedIdx, totalItems) {
                if(!db || !USER_NODE) return;
                
                let oldLevel = 0;
                if(localProgress[category] && localProgress[category].level !== undefined) {
                    oldLevel = localProgress[category].level;
                }

                let newLevel = Math.ceil(((clickedIdx + 1) / totalItems) * 100);
                
                const maxCompletedIdx = Math.floor((oldLevel / 100) * totalItems) - 1;
                if(clickedIdx === maxCompletedIdx) {
                    newLevel = Math.ceil((clickedIdx / totalItems) * 100);
                }

                document.getElementById('k-main').style.opacity = '0.7';

                db.ref(USER_NODE + 'knowledge/' + category).set({
                    level: newLevel,
                    updatedAt: Date.now()
                }).then(() => {
                    localProgress[category] = { level: newLevel };
                    document.getElementById('k-main').style.opacity = '1';
                    
                    let color = getCatColor(category);
                    renderMainArea(category, color, newLevel);
                    
                    // Update sidebar button
                    const sidebar = document.getElementById('k-sidebar');
                    const btns = sidebar.querySelectorAll('.category-btn');
                    btns.forEach(btn => {
                        if(btn.innerHTML.includes(category)) {
                            const levelSpan = btn.querySelector('span > span');
                            if(levelSpan) levelSpan.innerText = `(${newLevel}%)`;
                            // Update circle size
                            const circle = btn.querySelector('div');
                            if(circle) {
                                const newSize = 6 + (newLevel / 100) * 12;
                                circle.style.width = newSize + 'px';
                                circle.style.height = newSize + 'px';
                                circle.style.opacity = newLevel === 0 ? '0.3' : '1';
                            }
                        }
                    });
                }).catch(e => {
                    console.error("Błąd zapisu Firebase:", e);
                    document.getElementById('k-main').style.opacity = '1';
                });
            };
        });
    </script>
    <script src="js/topbar.js?v=19.0"></script>
</body>
</html>
