<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budżet - B-Core</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json?v=2">
    <meta name="theme-color" content="#1C1C1E">
    <link rel="icon" type="image/png" href="icons/icon-512.png">
    <link rel="apple-touch-icon" href="icons/icon-512.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=20.3">
    <style>
        .expense-grid {
            display: grid;
            grid-template-columns: 340px 1fr;
            gap: var(--space-4);
            height: calc(100vh - 160px);
        }
        .expense-sidebar {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: var(--space-3);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .expense-main {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: var(--space-4);
            overflow-y: auto;
        }
        .expense-cat-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 8px 12px;
            background: transparent;
            border: 1px solid transparent;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-family: var(--font-sans);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
            text-align: left;
        }
        .expense-cat-btn:hover { background: rgba(255,255,255,0.03); border-color: var(--border-subtle); }
        .expense-cat-btn.active { background: rgba(255,255,255,0.05); border-color: var(--accent-primary); color: var(--text-primary); }

        .sidebar-section-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin: 12px 4px 4px;
        }

        .expense-add-row {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(0,0,0,0.2);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-subtle);
            flex-wrap: wrap;
            align-items: center;
        }
        .expense-add-row input, .expense-add-row select {
            flex: 1;
            min-width: 100px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: var(--font-sans);
            font-size: 0.85rem;
            padding: 8px 10px;
            outline: none;
            transition: border-color 0.2s;
        }
        .expense-add-row input:focus, .expense-add-row select:focus {
            border-color: var(--accent-primary);
        }
        .expense-add-row input[type="number"] { max-width: 120px; }
        .expense-add-row input[type="date"] { max-width: 140px; }
        .expense-add-row button {
            padding: 8px 16px;
            background: var(--accent-primary);
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .expense-add-row button:hover { opacity: 0.85; }

        .expense-table {
            width: 100%;
            border-collapse: collapse;
        }
        .expense-table th {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            padding: 8px 10px;
            border-bottom: 1px solid var(--border-subtle);
            text-align: left;
        }
        .expense-table td {
            padding: 8px 10px;
            font-size: 0.85rem;
            color: var(--text-primary);
            border-bottom: 1px solid rgba(255,255,255,0.03);
            vertical-align: middle;
        }
        .expense-table tr:hover td {
            background: rgba(255,255,255,0.02);
        }
        .expense-delete-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            opacity: 0.4;
            transition: all 0.2s;
            padding: 4px;
        }
        .expense-delete-btn:hover { opacity: 1; color: var(--accent-warning); }

        .expense-summary-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .expense-summary-card {
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 120px;
        }
        .expense-summary-card .label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
        }
        .expense-summary-card .value {
            font-size: 1.2rem;
            font-weight: 700;
            font-family: var(--font-mono);
        }

        .status-badge {
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
            white-space: nowrap;
        }
        .status-badge:hover { opacity: 0.8; }
        .status-realized { background: rgba(43, 191, 113, 0.15); color: #2BBF71; border: 1px solid rgba(43, 191, 113, 0.3); }
        .status-planned { background: rgba(255, 159, 10, 0.15); color: #FF9F0A; border: 1px solid rgba(255, 159, 10, 0.3); }
        .status-badge.disabled { cursor: default; }
        .status-badge.disabled:hover { opacity: 1; }

        .row-planned { opacity: 0.65; }

        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }
        .toggle-switch input { display: none; }
        .toggle-slider {
            width: 32px;
            height: 18px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            position: relative;
            transition: background 0.2s;
        }
        .toggle-slider::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: #fff;
            border-radius: 50%;
            transition: left 0.2s;
        }
        .toggle-switch input:checked + .toggle-slider { background: #2BBF71; }
        .toggle-switch input:checked + .toggle-slider::after { left: 16px; }

        @media (max-width: 768px) {
            .expense-grid { grid-template-columns: 1fr; height: auto; }
            .expense-sidebar { max-height: 200px; }
        }
    </style>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging-compat.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header class="topbar">
        <div class="logo">
            <button class="btn btn-ghost" id="mobile-menu-btn" style="padding: 4px; display: none;"><i data-lucide="menu"></i></button>
            <i data-lucide="command" class="symbol"></i>
            <h1>B <span>-Core</span></h1>
            <div style="display:flex; flex-direction:column; margin-left: 12px; gap: 2px;">
                <span id="btn-force-srs-sync" style="font-size:10px; color:var(--text-secondary); cursor:pointer; padding:2px 4px; border-radius:4px; line-height: 1;" title="Synchronizuj ręcznie"><i data-lucide="refresh-cw" style="width:10px; height:10px; vertical-align:middle; margin-right:4px;"></i><span id="cloud-status" style="color:var(--accent-success);">Synced</span></span>
                <span id="mini-sync-status" style="font-size: 8px; color:var(--text-secondary); padding-left:4px; font-family:var(--font-mono);">Oczekiwanie...</span>
            </div>
            <button class="btn btn-ghost" id="theme-toggle-btn" style="margin-left: 10px; padding:4px 8px;" title="Przełącz Motyw"><i data-lucide="sun-moon"></i></button>
            <button class="btn btn-ghost" id="btn-zero-energy" style="margin-left: 6px; padding:4px 8px;" title="Włącz tryb Low Energy (Tryb Baterii)"><i data-lucide="battery-low"></i></button>
        </div>
        
        <div style="flex-grow:1; max-width:400px; margin:0 20px;">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom: 6px;">
                <label style="width:50px; color:var(--text-secondary); font-size:0.85rem; font-weight:500;">Energia</label>
                <div class="energy-track" id="energy-track" title="Kliknij, by ustawić energię">
                    <div class="energy-fill" id="energy-fill" style="width: 50%;"></div>
                </div>
                <span class="energy-val" id="energy-val-display" style="width:40px; font-family:var(--font-mono); font-weight:500; font-size:0.85rem;">5/10</span>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <label style="width:50px; color:var(--accent-info); font-size:0.85rem; font-weight:500;">Dzień</label>
                <div class="energy-track" style="background:rgba(255,255,255,0.05); pointer-events:none;">
                    <div class="energy-fill" id="time-fill" style="width: 0%; background:var(--accent-info); transition: width 1s linear;"></div>
                </div>
                <span id="time-val-display" style="width:40px; font-family:var(--font-mono); font-weight:500; font-size:0.85rem; color:#fff;">--:--</span>
            </div>
        </div>

        <div class="top-stats">
            <a href="index.html" class="btn btn-ghost" title="Powrót do Pulpitu"><i data-lucide="layout-dashboard"></i> Pulpit</a>
            <a href="inbox.html" class="btn btn-ghost" title="Skok do Zrzutni Zadań"><i data-lucide="inbox"></i> Zrzutnia</a>
            <a href="knowledge.html" class="btn btn-ghost" title="Baza Wiedzy"><i data-lucide="network"></i> Wiedza</a>
            <a href="budget.html" class="btn btn-ghost" title="Budżet i Inwestycje"><i data-lucide="landmark"></i> Budżet</a>
        </div>
    </header>

    <div class="container">
        <main class="main-content">
        <section class="content-area">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: var(--space-4);">
                <div>
                    <h2 style="font-size: 1.5rem; display:flex; align-items:center; gap:12px; font-weight:600;"><i data-lucide="landmark" style="color:#FF9F0A; width:24px; height:24px;"></i> Budżet i Inwestycje</h2>
                    <span class="date-subtitle" style="font-family: var(--font-sans); color: var(--text-secondary); margin-bottom: 0;">Zarządzaj przepływami finansowymi, kontroluj wydatki i monitoruj inwestycje.</span>
                </div>
            </div>

            <div class="expense-grid">
                <div class="expense-sidebar" id="exp-sidebar"></div>
                <div class="expense-main" id="exp-main">
                    <p style="color:var(--text-secondary); text-align:center; padding-top: 40px;">Wybierz kategorię z lewego panelu.</p>
                </div>
            </div>

            <!-- SKRZYNKA MARZEŃ W BUDŻECIE -->
            <div style="margin-top: 40px; border-top: 1px solid var(--border-subtle); padding-top: 30px;">
                <h2 style="font-size: 1.2rem; display:flex; align-items:center; gap:8px; color: #FF375F; margin-bottom: 16px;"><i data-lucide="gift"></i> Skrzynka Marzeń (Wydatki na Kiedyś)</h2>
                <div style="max-width: 600px;">
                    <div style="display:flex; gap:8px; margin-bottom:12px;">
                        <input type="text" id="wishlist-input" placeholder="Co chcesz kupić na kiedyś?" style="flex:1; background:rgba(0,0,0,0.2); border:1px solid var(--border-subtle); color:var(--text-primary); padding:10px; font-family:var(--font-sans); font-size:0.85rem; border-radius: var(--radius-sm); outline:none;">
                        <input type="number" id="wishlist-price" placeholder="PLN" style="width:80px; background:rgba(0,0,0,0.2); border:1px solid var(--border-subtle); color:var(--text-primary); padding:10px; font-family:var(--font-sans); font-size:0.85rem; border-radius: var(--radius-sm); outline:none;">
                    </div>
                    <button class="btn btn-secondary" id="btn-save-wishlist" style="width:100%; color:var(--text-secondary); justify-content:center; margin-bottom:16px;"><i data-lucide="plus"></i> Dodaj marzenie</button>
                    <div id="wishlist-list" style="display:flex; flex-direction:column; gap:8px;"></div>
                </div>
            </div>

        </section>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="js/sidebar.js"></script>
    <script type="module" src="js/global.js"></script>
    <script type="module" src="js/budget.js"></script>
        </body>
</html>
