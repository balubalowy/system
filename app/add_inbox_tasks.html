<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Dodaj Zadania do Zrzutni</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="js/firebase_init.js"></script>
</head>
<body style="background: #111; color: #eee; font-family: sans-serif; padding: 40px;">
    <h2>Szybkie Dodawanie Zadań</h2>
    <p>Skrypt automatycznie wrzuci całą Twoją listę zadań do odpowiednich szufladek w bazie danych.</p>
    <button id="btn-run" style="padding: 10px 20px; font-size: 16px; cursor: pointer; background: #0A84FF; color: white; border: none; border-radius: 5px;">Wykonaj zrzut do bazy</button>
    <div id="log" style="margin-top: 20px; font-family: monospace; line-height: 1.5;"></div>

    <script>
        const newTasks = {
            priority: [
                "przebrnąć przez wszystkie modele python w folderach po antygravity",
                "kurs python z yt",
                "pamiętać ciągle o dobrych praktykach programowania",
                "kurs sql z yt",
                "kurs vba z yt",
                "kurs zaawansowanego excela z yt",
                "kurs powerbi z yt",
                "kurs angielskiego (wymowa / komunikacja) z yt",
                "czytać po angielsku podręcznik o wycenie spółek",
                "rozdzielić tematy do podręcznika o wycenie, by każdy wiedział czym się chce zająć"
            ],
            admin: [
                "ogarnąć do końca sprawę z sob",
                "zrobić test do mystery shopping"
            ],
            light: [
                "ogarnąć lekarzy (bóle klatki, psychiatra, alergolog, dentysta, neurolog )"
            ],
            sensory: [
                "biegi ranne"
            ]
        };

        document.getElementById('btn-run').addEventListener('click', async () => {
            const btn = document.getElementById('btn-run');
            const log = document.getElementById('log');
            btn.disabled = true;
            btn.innerText = 'Przetwarzanie...';

            log.innerHTML += 'Pobieranie aktualnej Zrzutni...<br>';
            
            const snap = await db.ref(USER_NODE + 'inbox').once('value');
            const currentData = snap.val() || {};

            for(const [key, tasks] of Object.entries(newTasks)) {
                let existing = currentData[key] ? currentData[key].split('\\n').filter(l => l.trim().length > 0) : [];
                tasks.forEach(t => {
                    // Sprawdzenie by nie duplikować jeśli odpali się dwa razy
                    if(!existing.includes("- " + t)) {
                        existing.push("- " + t);
                    }
                });
                await db.ref(USER_NODE + 'inbox/' + key).set(existing.join('\\n'));
                log.innerHTML += '✅ Przetworzono sekcję: ' + key.toUpperCase() + ' (' + tasks.length + ' nowych wpisów)<br>';
            }

            log.innerHTML += '<br><b>Gotowe!</b> Zadania wstrzyknięte do bazy. Możesz teraz wrócić do <a href="inbox.html" style="color:#0A84FF;">Zrzutni (Inbox)</a>.';
        });
    </script>
</body>
</html>
