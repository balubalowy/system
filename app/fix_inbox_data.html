<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Fix Inbox Data</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="js/firebase_init.js"></script>
</head>
<body style="background: #111; color: #eee; font-family: sans-serif; padding: 40px;">
    <h2>Naprawa Zrzutni</h2>
    <p>Ten skrypt zamieni literały \n na prawdziwe znaki nowej linii w bazie, by zadania podzieliły się na odrębne wpisy.</p>
    <button id="btn-run" style="padding: 10px 20px; font-size: 16px; cursor: pointer; background: #0A84FF; color: white; border: none; border-radius: 5px;">Napraw</button>
    <div id="log" style="margin-top: 20px; font-family: monospace; line-height: 1.5;"></div>

    <script>
        document.getElementById('btn-run').addEventListener('click', async () => {
            const btn = document.getElementById('btn-run');
            const log = document.getElementById('log');
            btn.disabled = true;
            btn.innerText = 'Naprawianie...';

            log.innerHTML += 'Pobieranie zepsutej zrzutni...<br>';
            
            const snap = await db.ref(USER_NODE + 'inbox').once('value');
            const data = snap.val();

            if(data) {
                for(let k of Object.keys(data)) {
                    if(typeof data[k] === 'string' && data[k].includes('\\n')) {
                        // Zamiana literału \n na faktyczny znak \n
                        let fixed = data[k].replace(/\\n/g, '\n');
                        await db.ref(USER_NODE + 'inbox/' + k).set(fixed);
                        log.innerHTML += '✅ Naprawiono sekcję: ' + k + '<br>';
                    }
                }
            }

            log.innerHTML += '<br><b>Zrobione!</b> Zamknij tę kartę i odśwież aplikację.';
        });
    </script>
</body>
</html>
