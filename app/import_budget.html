        document.getElementById('btn-import').addEventListener('click', async () => {
            const btn = document.getElementById('btn-import');
            const log = document.getElementById('log');
            btn.disabled = true;
            btn.innerText = 'Importowanie...';

            let count = 0;
            const categories = Object.keys(IMPORT_DATA);
            
            for(let cat of categories) {
                const items = IMPORT_DATA[cat];
                for(let key of Object.keys(items)) {
                    const expense = items[key];
                    await db.ref(USER_NODE + 'expenses/' + cat).push().set(expense);
                    count++;
                }
            }

            log.innerHTML = '✅ Sukces! Zaimportowano ' + count + ' transakcji do bazy danych.<br>Możesz teraz bezpiecznie zamknąć ten plik i wrócić do <a href="expenses.html" style="color:#0A84FF;">Bazy Wydatków</a>.';
        });
    </script>
