<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Naprawa Przyszłych Transakcji</title>
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="js/firebase_init.js"></script>
</head>
<body style="background: #111; color: #eee; font-family: sans-serif; padding: 40px;">
    <h2>Naprawa Dat: Przyszłe transakcje -> Planowane</h2>
    <p>Skrypt przejrzy Twoje wydatki i przychody. Jeśli coś ma datę w przyszłości (późniejszą niż dzisiaj), odznaczy to jako "Planowane".</p>
    <button id="btn-fix" style="padding: 10px 20px; font-size: 16px; cursor: pointer; background: #FF9F0A; color: white; border: none; border-radius: 5px;">Napraw statusy</button>
    <div id="log" style="margin-top: 20px; font-family: monospace;"></div>

    <script>
        document.getElementById('btn-fix').addEventListener('click', async () => {
            const btn = document.getElementById('btn-fix');
            const log = document.getElementById('log');
            btn.disabled = true;
            btn.innerText = 'Przetwarzanie...';

            let count = 0;
            const today = new Date().toISOString().split('T')[0];
            const nodes = ['expenses', 'incomes'];

            for(let node of nodes) {
                const snap = await db.ref(USER_NODE + node).once('value');
                const data = snap.val();
                if(!data) continue;

                for(let cat of Object.keys(data)) {
                    for(let key of Object.keys(data[cat])) {
                        const txn = data[cat][key];
                        // Jeśli data jest w przyszłości i transakcja jest oznaczona jako zrealizowana (lub brak pola)
                        if(txn.date && txn.date > today && txn.realized !== false) {
                            await db.ref(USER_NODE + node + '/' + cat + '/' + key).update({ realized: false });
                            count++;
                        }
                    }
                }
            }

            log.innerHTML = '✅ Sukces! Zmieniono status ' + count + ' transakcji na "Planowane".<br>Możesz teraz bezpiecznie wrócić do <a href="budget.html" style="color:#0A84FF;">Podsumowania Budżetu</a>.';
        });
    </script>
</body>
</html>
