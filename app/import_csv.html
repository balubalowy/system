        document.getElementById('btn-import').addEventListener('click', async () => {
            const btn = document.getElementById('btn-import');
            const log = document.getElementById('log');
            btn.disabled = true;
            btn.innerText = 'Importowanie...';

            let count = 0;
            const nodes = ['incomes', 'expenses'];
            
            for(let node of nodes) {
                const categoriesObj = IMPORT_DATA[node];
                if(!categoriesObj) continue;
                
                const categories = Object.keys(categoriesObj);
                for(let cat of categories) {
                    const itemsArr = categoriesObj[cat];
                    for(let expense of itemsArr) {
                        await db.ref(USER_NODE + node + '/' + cat).push().set(expense);
                        count++;
                    }
                }
            }

            log.innerHTML = '✅ Sukces! Zaimportowano ' + count + ' transakcji do bazy danych (Wydatki oraz Przychody!).<br>Możesz teraz bezpiecznie wrócić do <a href="budget.html" style="color:#0A84FF;">Podsumowania Budżetu</a>.';
        });
